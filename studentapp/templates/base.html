


<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Portal</title>

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<body class="flex flex-col min-h-screen bg-gray-100">

<!-- NAVBAR -->
<nav class="bg-gradient-to-r from-indigo-700 to-purple-700 text-white shadow-lg">
    <div class="max-w-7xl mx-auto px-4">
        
        <div class="flex justify-between items-center h-16">
            
            <!-- Logo -->
            <a href="#" class="flex items-center gap-2 text-xl font-bold">
                <i class="bi bi-people-fill text-2xl"></i>
                Student Portal
            </a>

            <!-- Mobile button -->
            <button id="menuBtn" class="lg:hidden text-2xl">
                <i class="bi bi-list"></i>
            </button>

            <!-- Menu -->
            <ul id="menu"
                class="hidden lg:flex gap-6 font-medium">
                
                <li><a href="{% url 'signin' %}" class="hover:text-yellow-300">Home</a></li>
                <li><a href="#" class="hover:text-yellow-300">View Student</a></li>
                <li><a href="#" class="hover:text-yellow-300">Profile</a></li>
                <li><a href="#" class="hover:text-yellow-300">Attendance</a></li>
                <li><a href="#" class="hover:text-yellow-300">Assignments</a></li>

                <!-- Logout -->
                <li>
                    <form action="{% url 'logout' %}" method="post">
                        {% csrf_token %}
                        <button class="bg-red-500 px-3 py-1 rounded hover:bg-red-600 transition">
                            Logout
                        </button>
                    </form>
                </li>
            </ul>

        </div>
    </div>
</nav>

<!-- CONTENT -->
<div class="flex-1 p-6">
    {% block base %}
{% endblock base %}
</div>

<!-- FOOTER -->
<footer class="bg-gradient-to-r from-indigo-700 to-purple-700 text-white text-center py-4 mt-auto">
    <p class="text-sm">
        © 2026 Student Portal | Designed with Tailwind 💙
    </p>
</footer>

<!-- Mobile Menu Script -->
<script>
    const btn = document.getElementById("menuBtn");
    const menu = document.getElementById("menu");

    btn.addEventListener("click", () => {
        menu.classList.toggle("hidden");
        menu.classList.toggle("flex");
        menu.classList.toggle("flex-col");
        menu.classList.toggle("absolute");
        menu.classList.toggle("top-16");
        menu.classList.toggle("right-4");
        menu.classList.toggle("bg-indigo-700");
        menu.classList.toggle("p-4");
        menu.classList.toggle("rounded-lg");
    });
</script>

</body>
</html>
