{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Login</title>

    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-blue-900 via-purple-900 to-black min-h-screen flex items-center justify-center">

    <div class="flex min-h-screen items-center justify-center p-4">

        <div class="w-full max-w-6xl overflow-hidden rounded-3xl bg-white shadow-2xl">

            <div class="grid md:grid-cols-2">

                <!-- Left Image Section -->
                <div class="hidden md:block relative">

                    <img src="{% static 'images/school.jpg' %}"
                         alt="School"
                         class="h-full w-full object-cover">

                    <div class="absolute inset-0 bg-black/40 flex flex-col justify-center items-center text-white">

                        <h1 class="text-4xl font-bold mb-4">
                            Welcome Back
                        </h1>

                        <p class="text-lg text-center px-8">
                            School Management System
                        </p>

                    </div>

                </div>

                <!-- Login Form -->
                <div class="p-8 md:p-12">

                    <div class="text-center mb-8">

                        <div class="w-20 h-20 mx-auto bg-blue-100 rounded-full flex items-center justify-center">

                            <svg xmlns="http://www.w3.org/2000/svg"
                                 class="h-10 w-10 text-blue-600"
                                 fill="none"
                                 viewBox="0 0 24 24"
                                 stroke="currentColor">
                                <path stroke-linecap="round"
                                      stroke-linejoin="round"
                                      stroke-width="2"
                                      d="M12 14l9-5-9-5-9 5 9 5z"/>
                                <path stroke-linecap="round"
                                      stroke-linejoin="round"
                                      stroke-width="2"
                                      d="M12 14l6.16-3.422A12.083 12.083 0 0120 17.944L12 21l-8-3.056a12.083 12.083 0 011.84-7.366L12 14z"/>
                            </svg>

                        </div>

                        <h2 class="mt-4 text-3xl font-bold text-gray-800">
                            Student Login
                        </h2>

                        <p class="text-gray-500 mt-2">
                            Sign in to continue
                        </p>

                    </div>

                    <form method="post" class="space-y-5">
                        {% csrf_token %}

                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">
                                Username
                            </label>
                            {{ form.username }}
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">
                                Password
                            </label>
                            {{ form.password }}
                        </div>

                        <button
                            type="submit"
                            class="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-lg font-semibold transition duration-300">
                            Sign In
                        </button>

                        <div class="text-center">
                            <a href="{% url 'signup' %}"
                               class="text-blue-600 hover:text-blue-800 font-medium">
                                New Student? Register Here
                            </a>
                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</body>
</html>
