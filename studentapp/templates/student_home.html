





{% extends 'base.html' %}
{% block base %}

<!-- TOP ACTION -->
<div class="flex justify-between items-center px-6 mt-6 flex-wrap gap-3">

    <h1 class="text-3xl md:text-4xl font-bold text-red-600">
        Student List
    </h1>

    <a href="{% url 'addstudent' %}"
       class="bg-green-600 hover:bg-green-700 text-white px-5 py-2 rounded-lg shadow-md transition">
        + Add Student
    </a>

</div>

<!-- GRID -->
<div class="max-w-7xl mx-auto px-6 py-10">
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-2 gap-6">

        {% for i in slist %}

        <div class="bg-white rounded-2xl shadow-lg hover:shadow-2xl transition p-5 flex items-center gap-5">

            <!-- IMAGE -->
            <div class="flex-shrink-0">
                {% if i.picture %}
                    <img src="{{ i.picture.url }}"
                         class="w-24 h-24 rounded-full object-cover border-4 border-indigo-500">
                {% else %}
                    <div class="w-24 h-24 rounded-full bg-gray-300 flex items-center justify-center">
                        <i class="bi bi-person-fill text-4xl text-gray-600"></i>
                    </div>
                {% endif %}
            </div>

            <!-- DETAILS -->
            <div class="flex-1">

                <h2 class="text-xl font-bold text-gray-800">
                    {{ i.name }}
                </h2>

                <p class="text-sm text-gray-600 mt-1">
                    <span class="font-semibold">Class:</span> {{ i.studentclass }}
                </p>

                <p class="text-sm text-gray-600">
                    <span class="font-semibold">DOB:</span> {{ i.dob }}
                </p>

                <p class="text-sm text-gray-600 mb-3">
                    <span class="font-semibold">Year:</span> {{ i.year }}
                </p>

                <!-- BUTTONS -->
                <div class="flex gap-2">

                    <a href="{% url 'editstudent' i.id %}"
                       class="bg-yellow-500 hover:bg-yellow-600 text-white px-4 py-1 rounded-lg text-sm transition">
                        Edit
                    </a>

                    <a href="{% url 'deletestudent' i.id %}"
                       class="bg-red-500 hover:bg-red-600 text-white px-4 py-1 rounded-lg text-sm transition">
                        Delete
                    </a>

                </div>

            </div>
        </div>

        {% endfor %}

    </div>
</div>

{% endblock %}
