



{% extends 'base.html' %}

{% block base %}

<div class="min-h-screen flex flex-col items-center justify-start bg-gray-100 px-4 pt-4 pb-10">

    <div class="w-full max-w-2xl bg-white rounded-2xl shadow-2xl overflow-hidden">

        <!-- HEADER -->
         <div class="bg-gradient-to-r from-indigo-600 to-purple-600 text-white text-center py-5">
            <h2 class="text-2xl md:text-3xl font-bold">
                Add Student
            </h2>
        </div>

        <!-- FORM -->
        <div class="p-6 md:p-10">

            <form method="post" enctype="multipart/form-data" class="space-y-5">
                {% csrf_token %}

                <!-- Django form fields -->
                <div class="space-y-4">
                    {{ form.as_p }}
                </div>

                <!-- BUTTON -->
                <div class="text-center pt-4">
                    <button type="submit"
                            class="bg-blue-700 hover:bg-red-700 text-white px-8 py-2 rounded-lg shadow-md transition font-semibold">
                        Submit
                    </button>

                    <a href="{% url 'shome' %}"
                        class="bg-blue-700 hover:bg-red-700 text-white px-8 py-2 rounded-lg shadow-md transition font-semibold inline-block">
                         Cancel
                    </a>
                    <!-- <button type="cancel"
                        class="bg-blue-700 hover:bg-red-700 text-white px-8 py-2 rounded-lg shadow-md transition font-semibold">
                        Cancel
                    </button> -->

                </div>

            </form>

        </div>

    </div>

</div>

{% endblock %}
